<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Nari Pad Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="dashboard.html" class="logo">NPB Portal</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="register.html">Register Member</a>
            <a href="delivery.html">Deliveries</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
        <div id="userInfo" style="font-weight: 600;"></div>
    </nav>

    <div class="container">
        <header style="margin-bottom: 2rem;">
            <h1>Dashboard</h1>
            <p id="welcomeMsg" style="color: var(--text-muted);"></p>
        </header>

        <div id="adminStats" class="stats-grid hidden">
            <div class="stat-card">
                <label>Total Members</label>
                <div id="totalMembers" class="stat-value">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--success);">
                <label>Active Members</label>
                <div id="activeMembers" class="stat-value">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--secondary);">
                <label>Total Revenue</label>
                <div id="totalRevenue" class="stat-value">₹ 0</div>
            </div>
        </div>

        <div class="glass-card">
            <h3>Recent Members</h3>
            <div class="table-container">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>Member ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="fraudSection" class="glass-card hidden" style="margin-top: 2rem; border-color: var(--danger);">
            <h3 style="background: var(--danger); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Fraud Detection Results</h3>
            <div id="fraudResults"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;

            document.getElementById('welcomeMsg').innerText = `Welcome back, ${user.name} (${user.role})`;
            document.getElementById('userInfo').innerText = user.name;

            // Load Dashboard Stats if Admin/Associate/Supervisor
            if (['Admin', 'Associate', 'Supervisor'].includes(user.role)) {
                document.getElementById('adminStats').classList.remove('hidden');
                loadStats();
            }

            // Load Fraud Check if Admin
            if (user.role === 'Admin') {
                document.getElementById('fraudSection').classList.remove('hidden');
                loadFraudCheck();
            }

            loadMembers();
        });

        async function loadStats() {
            const res = await apiFetch('/api/admin/dashboard');
            if (res.ok) {
                const data = await res.json();
                document.getElementById('totalMembers').innerText = data.totalMembers;
                document.getElementById('activeMembers').innerText = data.activeMembers;
                document.getElementById('totalRevenue').innerText = `₹ ${data.totalRevenue}`;
            }
        }

        async function loadFraudCheck() {
            const res = await apiFetch('/api/admin/fraud-check');
            if (res.ok) {
                const data = await res.json();
                const container = document.getElementById('fraudResults');
                if (data.duplicates.length === 0) {
                    container.innerHTML = '<p style="color: var(--success);">No duplicate phone numbers found.</p>';
                } else {
                    container.innerHTML = data.duplicates.map(d => `
                        <div style="margin-bottom: 1rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-radius: 0.5rem;">
                            <strong>Phone: ${d._id}</strong> - ${d.count} occurrences
                            <ul style="margin-left: 1rem;">
                                ${d.members.map(m => `<li>${m.name} (${m.member_id})</li>`).join('')}
                            </ul>
                        </div>
                    `).join('');
                }
            }
        }

        async function loadMembers() {
            const res = await apiFetch('/api/members');
            if (res.ok) {
                const members = await res.json();
                const tbody = document.querySelector('#membersTable tbody');
                tbody.innerHTML = members.map(m => `
                    <tr>
                        <td>${m.member_id}</td>
                        <td>${m.name}</td>
                        <td>${m.phone}</td>
                        <td>
                            <span style="padding: 0.25rem 0.5rem; border-radius: 1rem; font-size: 0.8rem; background: ${m.status === 'active' ? 'var(--success)' : 'var(--warning)'}">
                                ${m.status}
                            </span>
                        </td>
                        <td>
                            ${m.status === 'pending' && JSON.parse(localStorage.getItem('user')).role === 'Admin' 
                                ? `<button class="btn btn-success" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" onclick="approveMember('${m._id}')">Approve</button>` 
                                : ''}
                            <a href="delivery.html?id=${m._id}" class="btn btn-primary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">Deliver</a>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function approveMember(id) {
            const res = await apiFetch('/api/admin/approve-member', {
                method: 'POST',
                body: JSON.stringify({ memberId: id })
            });
            if (res.ok) {
                alert('Member approved!');
                loadMembers();
                loadStats();
            }
        }
    </script>
</body>
</html>
