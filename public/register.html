<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Member | Nari Pad Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="dashboard.html" class="logo">NPB Portal</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="register.html">Register Member</a>
            <a href="delivery.html">Deliveries</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="glass-card">
            <h1>Register New Member</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Registration Fee: ₹170 (Payable at Centre)</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter member name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" placeholder="Enter member phone" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register Member</button>
            </form>
            <p id="message" style="margin-top: 1rem; text-align: center;"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message');

            const res = await apiFetch('/api/members/register', {
                method: 'POST',
                body: JSON.stringify({ name, phone })
            });
            
            const data = await res.json();
            if (res.ok) {
                message.style.color = 'var(--success)';
                message.innerText = `Member registered! ID: ${data.member.member_id}. Pending Admin approval.`;
                document.getElementById('registerForm').reset();
            } else {
                message.style.color = 'var(--danger)';
                message.innerText = data.message;
            }
        });
    </script>
</body>
</html>
